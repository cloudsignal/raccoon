<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Raccoon icon preview</title>
<style>
  :root { font-family: ui-sans-serif, system-ui, sans-serif; }
  body { margin: 0; background: #f5f5f5; color: #111; }
  header { padding: 24px 28px 8px; }
  h1 { font-size: 18px; margin: 0; }
  p { color: #666; font-size: 13px; margin: 6px 0 0; }
  .grid { display: flex; flex-wrap: wrap; gap: 32px; align-items: flex-end; padding: 24px 28px; }
  .cell { text-align: center; }
  .cell img { display: block; }
  .cell span { font-size: 11px; color: #888; display: block; margin-top: 8px; }
  .tile { border-radius: 22.5%; overflow: hidden; box-shadow: 0 6px 18px rgba(0,0,0,.14); }
  .rows { display: flex; gap: 40px; flex-wrap: wrap; padding: 8px 28px 40px; }
  .screen { width: 210px; height: 150px; border-radius: 20px; display: flex;
            align-items: center; justify-content: center; gap: 18px; }
  .screen.light { background: #ffffff; box-shadow: inset 0 0 0 1px #e5e5e5; }
  .screen.dark  { background: #0b0b0b; }
  .home { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .home .tile { width: 60px; height: 60px; }
  .home small { font-size: 11px; }
  .screen.dark .home small { color: #eee; }
  .maskring { position: relative; }
  .maskring::after { content:""; position:absolute; inset:0; border-radius:50%;
    box-shadow: 0 0 0 2px #d33 inset; opacity:.5; }
</style>
</head>
<body>
  <header>
    <h1>Raccoon 🦝 — PWA icon</h1>
    <p>Exported design mark. Full-color squircle shown at real sizes + on mock home screens.</p>
  </header>

  <div class="grid">
    <div class="cell"><img class="tile" src="raccoon-icon-squircle.svg" width="192" height="192"/><span>192 · app tile</span></div>
    <div class="cell"><img class="tile" src="raccoon-icon-squircle.svg" width="96" height="96"/><span>96</span></div>
    <div class="cell"><img src="raccoon-icon-squircle.svg" width="48" height="48"/><span>48</span></div>
    <div class="cell"><img src="raccoon-icon-squircle.svg" width="32" height="32"/><span>32 · favicon</span></div>
    <div class="cell"><img src="raccoon-icon-squircle.svg" width="16" height="16"/><span>16</span></div>
    <div class="cell maskring"><img src="raccoon-icon-squircle.svg" width="160" height="160" style="border-radius:50%"/><span>maskable (circle clip)</span></div>
  </div>

  <div class="rows">
    <div class="screen light">
      <div class="home"><img class="tile" src="raccoon-icon-squircle.svg"/><small>Raccoon</small></div>
    </div>
    <div class="screen dark">
      <div class="home"><img class="tile" src="raccoon-icon-squircle.svg"/><small>Raccoon</small></div>
    </div>
  </div>
</body>
</html>
